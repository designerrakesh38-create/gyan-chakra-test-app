services:
  - type: web
    name: gyan-chakra-app
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: ADMIN_PIN
        sync: false
    disk:
      name: gyan-chakra-data
      mountPath: /var/data
      sizeGB: 1
